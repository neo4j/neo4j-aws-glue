version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 3
  - package-ecosystem: maven
    directory: "/"
    registries: "*"
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    open-pull-requests-limit: 10
