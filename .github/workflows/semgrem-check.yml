on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: "0 6 * * *"

jobs:
  build-dependency-tree:
    name: Build dependency trees
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      actions: 'read'
      checks: 'write'
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1   # v7.0.1
      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: zulu
          java-version: 17
      - name: Build dependency tree
        run: ./mvnw dependency:tree -q -DoutputFile=maven_dep_tree.txt
      - name: Upload dependency tree file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: maven-dependency-tree
          path: maven_dep_tree.txt

  semgrep-check:
    name: Run Semgrep scan
    runs-on: ubuntu-latest
    needs: build-dependency-tree
    env:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    container:
      image: semgrep/semgrep:1.146.0
    permissions:
      contents: 'read'
      actions: 'read'
      checks: 'write'
    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1   # v7.0.1
      - name: Download Maven dependency tree artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: maven-dependency-tree
      - name: Semgrep scan
        run: |
          semgrep ci --no-git-ignore        
